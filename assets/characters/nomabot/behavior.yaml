render_mode: text

life_modes:
  work:
    default_activity: idle
  relax:
    default_activity: idle
  travel:
    default_activity: idle
  night:
    default_activity: sleep

activities:
  idle:
    life_modes: [work, relax, travel]
    behaviors:
      - id: look_around
        label: "Look around"
        weight: 30
        duration: { min: 4, max: 12 }
      - id: blink
        label: "Blink"
        weight: 25
        duration: { min: 2, max: 5 }
      - id: breathing
        label: "Breathing..."
        weight: 25
        duration: { min: 5, max: 15 }
      - id: wave
        label: "Wave"
        weight: 10
        duration: { min: 2, max: 4 }
      - id: smile
        label: "Smile"
        weight: 10
        duration: { min: 2, max: 4 }

  coding:
    life_modes: [work]
    behaviors:
      - id: typing
        label: "Typing..."
        weight: 70
        clip: coding
        duration: { min: 5, max: 15 }
      - id: coffee
        label: "Coffee"
        weight: 10
        clip: coffee
        duration: { min: 3, max: 8 }
        requires: { min_coffee_love: 50 }
      - id: think
        label: "Thinking..."
        weight: 10
        duration: { min: 4, max: 10 }
      - id: stretch
        label: "Stretch"
        weight: 5
        duration: { min: 2, max: 5 }
      - id: smile
        label: "Smile"
        weight: 5
        duration: { min: 2, max: 4 }

  sleep:
    life_modes: [night, work, relax]
    behaviors:
      - id: yawn
        label: "Yawn..."
        weight: 30
        duration: { min: 3, max: 6 }
      - id: blink_slow
        label: "Blink slowly..."
        weight: 25
        duration: { min: 4, max: 8 }
      - id: sleep
        label: "Sleep"
        weight: 30
        clip: sleep
        duration: { min: 10, max: 30 }
      - id: dream
        label: "Dream..."
        weight: 15
        duration: { min: 8, max: 20 }

emotions:
  happy:
    idle:
      behaviors:
        - id: wave
          label: "Wave"
          weight: 30
        - id: look_around
          label: "Look around"
          weight: 30
        - id: smile
          label: "Smile"
          weight: 40
    coding:
      behaviors:
        - id: typing
          label: "Typing..."
          weight: 50
        - id: smile
          label: "Smile"
          weight: 25
        - id: coffee
          label: "Coffee"
          weight: 25

  frustrated:
    coding:
      behaviors:
        - id: think
          label: "Thinking..."
          weight: 30
        - id: sigh
          label: "Sigh..."
          weight: 25
        - id: coffee
          label: "Coffee"
          weight: 20
        - id: typing_slow
          label: "Typing slowly..."
          weight: 25

  sleepy:
    idle:
      behaviors:
        - id: yawn
          label: "Yawn..."
          weight: 40
        - id: blink_slow
          label: "Blink slowly..."
          weight: 30
        - id: sleep
          label: "Sleep"
          weight: 30

  excited:
    idle:
      behaviors:
        - id: celebrate
          label: "Celebrate!"
          weight: 40
        - id: wave
          label: "Wave"
          weight: 30
        - id: smile
          label: "Smile"
          weight: 30

conditions:
  coffee:
    requires: { energy_lt: 40 }
  sleep:
    requires: { idle_minutes_gt: 10 }

memory:
  last_coffee: null
  last_build: null
  last_sleep: null

behavior_clips:
  typing: coding
  typing_slow: coding
  coffee: coffee
  sleep: sleep
  celebrate: celebrate
  breathing: idle
  blink: idle
