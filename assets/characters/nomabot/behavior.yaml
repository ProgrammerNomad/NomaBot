render_mode: sprite

life_modes:
  work:
    default_activity: idle
  home:
    default_activity: idle
  travel:
    default_activity: idle
  night:
    default_activity: sleep
  vacation:
    default_activity: idle

activities:
  idle:
    life_modes: [work, home, travel, vacation]
    behaviors:
      - id: breathing
        label: "Breathing..."
        weight: 50
        clip: idle
        duration: { min: 5, max: 15 }
      - id: blink
        label: "Blink"
        weight: 30
        clip: blink
        duration: { min: 2, max: 5 }
      - id: read
        label: "Reading..."
        weight: 20
        clip: think
        duration: { min: 6, max: 14 }

  coding:
    life_modes: [work]
    behaviors:
      - id: typing
        label: "Typing..."
        weight: 70
        clip: coding
        goal_boost: focus
        duration: { min: 5, max: 15 }
      - id: think
        label: "Thinking..."
        weight: 30
        clip: think
        goal_boost: focus
        duration: { min: 4, max: 10 }

  sleep:
    life_modes: [night, home]
    behaviors:
      - id: blink_slow
        label: "Blink slowly..."
        weight: 50
        clip: blink
        duration: { min: 4, max: 8 }
      - id: breathing
        label: "Breathing..."
        weight: 50
        clip: idle
        duration: { min: 5, max: 15 }

emotion_meta:
  happy:
    duration_sec: 120
    decay_to: neutral
  frustrated:
    duration_sec: 180
    decay_to: neutral
  sleepy:
    duration_sec: 300
    decay_to: neutral
  excited:
    duration_sec: 90
    decay_to: neutral

emotions:
  happy:
    idle:
      behaviors:
        - id: breathing
          label: "Breathing..."
          weight: 50
          clip: idle
        - id: blink
          label: "Blink"
          weight: 50
          clip: blink
    coding:
      behaviors:
        - id: typing
          label: "Typing..."
          weight: 60
          clip: coding
        - id: think
          label: "Thinking..."
          weight: 40
          clip: think

  frustrated:
    coding:
      behaviors:
        - id: think
          label: "Thinking..."
          weight: 50
          clip: think
        - id: typing_slow
          label: "Typing slowly..."
          weight: 50
          clip: coding

  sleepy:
    idle:
      behaviors:
        - id: blink_slow
          label: "Blink slowly..."
          weight: 60
          clip: blink
        - id: breathing
          label: "Breathing..."
          weight: 40
          clip: idle

  excited:
    idle:
      behaviors:
        - id: breathing
          label: "Breathing..."
          weight: 50
          clip: idle
        - id: blink
          label: "Blink"
          weight: 50
          clip: blink

goals:
  focus:
    coding:
      progress_per_behavior: 8
      complete_behavior: typing

habits:
  morning:
    life_modes: [work]
    hour_start: 8
    hour_end: 10
    sequence: [breathing, think]
  evening:
    life_modes: [home]
    hour_start: 18
    hour_end: 20
    sequence: [breathing, read]

season_boosts:
  monsoon:
    behaviors: [read, breathing]
    multiplier: 1.5
  winter:
    behaviors: [read, breathing]
    multiplier: 1.3

conditions:
  sleep:
    requires: { idle_minutes_gt: 10 }

behavior_clips:
  breathing: idle
  blink: blink
  blink_slow: blink
  read: think
  typing: coding
  typing_slow: coding
  think: think
