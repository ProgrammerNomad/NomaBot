render_mode: text

life_modes:
  work:
    default_activity: idle
  home:
    default_activity: idle
  travel:
    default_activity: idle
  night:
    default_activity: sleep
  vacation:
    default_activity: idle

activities:
  idle:
    life_modes: [work, home, travel, vacation]
    behaviors:
      - id: look_around
        label: "Look around"
        weight: 30
        likes: [travel, rain]
        duration: { min: 4, max: 12 }
      - id: blink
        label: "Blink"
        weight: 25
        duration: { min: 2, max: 5 }
      - id: breathing
        label: "Breathing..."
        weight: 25
        duration: { min: 5, max: 15 }
      - id: wave
        label: "Wave"
        weight: 10
        duration: { min: 2, max: 4 }
      - id: smile
        label: "Smile"
        weight: 10
        duration: { min: 2, max: 4 }
      - id: read
        label: "Reading..."
        weight: 8
        likes: [tea]
        duration: { min: 6, max: 14 }

  coding:
    life_modes: [work]
    behaviors:
      - id: typing
        label: "Typing..."
        weight: 70
        clip: coding
        goal_boost: focus
        duration: { min: 5, max: 15 }
      - id: coffee
        label: "Coffee"
        weight: 10
        clip: coffee
        likes: [coffee, tea]
        duration: { min: 3, max: 8 }
        requires: { min_coffee_love: 50 }
      - id: think
        label: "Thinking..."
        weight: 10
        goal_boost: focus
        duration: { min: 4, max: 10 }
      - id: stretch
        label: "Stretch"
        weight: 5
        duration: { min: 2, max: 5 }
      - id: smile
        label: "Smile"
        weight: 5
        duration: { min: 2, max: 4 }

  sleep:
    life_modes: [night, home]
    behaviors:
      - id: yawn
        label: "Yawn..."
        weight: 30
        duration: { min: 3, max: 6 }
      - id: blink_slow
        label: "Blink slowly..."
        weight: 25
        duration: { min: 4, max: 8 }
      - id: sleep
        label: "Sleep"
        weight: 30
        clip: sleep
        duration: { min: 10, max: 30 }
      - id: dream
        label: "Dream..."
        weight: 15
        duration: { min: 8, max: 20 }

emotion_meta:
  happy:
    duration_sec: 120
    decay_to: neutral
  frustrated:
    duration_sec: 180
    decay_to: neutral
  sleepy:
    duration_sec: 300
    decay_to: neutral
  excited:
    duration_sec: 90
    decay_to: neutral

emotions:
  happy:
    idle:
      behaviors:
        - id: wave
          label: "Wave"
          weight: 30
        - id: look_around
          label: "Look around"
          weight: 30
        - id: smile
          label: "Smile"
          weight: 40
    coding:
      behaviors:
        - id: typing
          label: "Typing..."
          weight: 50
        - id: smile
          label: "Smile"
          weight: 25
        - id: coffee
          label: "Coffee"
          weight: 25

  frustrated:
    coding:
      behaviors:
        - id: think
          label: "Thinking..."
          weight: 30
        - id: sigh
          label: "Sigh..."
          weight: 25
        - id: coffee
          label: "Coffee"
          weight: 20
        - id: typing_slow
          label: "Typing slowly..."
          weight: 25

  sleepy:
    idle:
      behaviors:
        - id: yawn
          label: "Yawn..."
          weight: 40
        - id: blink_slow
          label: "Blink slowly..."
          weight: 30
        - id: sleep
          label: "Sleep"
          weight: 30

  excited:
    idle:
      behaviors:
        - id: celebrate
          label: "Celebrate!"
          weight: 40
        - id: wave
          label: "Wave"
          weight: 30
        - id: smile
          label: "Smile"
          weight: 30

goals:
  focus:
    coding:
      progress_per_behavior: 8
      complete_behavior: celebrate
  recover:
    coding:
      sequence: [think, sigh, coffee, typing_slow]
  morning_routine:
    sequence: [stretch, coffee, look_around]
  dream:
    sequence: [dream, travel, bike, mountains, coffee]

habits:
  morning:
    life_modes: [work]
    hour_start: 8
    hour_end: 10
    goal: morning_routine
  tea_break:
    hour_start: 13
    hour_end: 14
    goal: recover
  evening:
    life_modes: [home]
    hour_start: 18
    hour_end: 20
    sequence: [look_around, read, smile]

season_boosts:
  monsoon:
    behaviors: [look_around, read]
    multiplier: 1.5
  winter:
    behaviors: [coffee, read]
    multiplier: 1.3

conditions:
  coffee:
    requires: { energy_lt: 40 }
  sleep:
    requires: { idle_minutes_gt: 10 }

behavior_clips:
  typing: coding
  typing_slow: coding
  coffee: coffee
  sleep: sleep
  celebrate: celebrate
  breathing: idle
  blink: idle
  travel: idle
  bike: idle
