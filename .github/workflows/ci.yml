name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Generate placeholder sprites
        run: uv run python scripts/generate_placeholder_sprites.py

      - name: Ruff check
        run: uv run ruff check sdk desktop scripts

      - name: Ruff format check
        run: uv run ruff format --check sdk desktop scripts

      - name: Validate profiles
        run: uv run python scripts/validate_profiles.py

      - name: Protocol lint
        run: uv run nomabot protocol lint sdk/tests/fixtures/protocol

      - name: Pytest
        run: uv run pytest sdk/tests desktop/tests -v

      - name: Build assets
        run: |
          uv run nomabot build-assets \
            --input assets/characters/nomabot \
            --output compiled/nomabot \
            --profile lilygo_tdisplay_s3

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
          key: platformio-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run -e lilygo_tdisplay_s3

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-lilygo_tdisplay_s3
          path: firmware/.pio/build/lilygo_tdisplay_s3/firmware.bin
          if-no-files-found: warn
